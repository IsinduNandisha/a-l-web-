<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Recordings Tracker</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Icons (Phosphor Icons or FontAwesome, using Phosphor Icons for a premium look) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- Auth Overlay -->
    <div class="auth-overlay active" id="authOverlay">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <i class="ph-fill ph-student"></i>
                <h2>My A/L Vault</h2>
                <p id="authSubtitle">Login to access your classes</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="ph ph-phone"></i>
                    <input type="text" id="loginPhone" placeholder="Phone Number (e.g. 0712345678)" required>
                </div>
                <div class="input-group">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
                <div class="auth-switch">
                    Don't have an account? <span id="showRegister">Register</span>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="ph ph-phone"></i>
                    <input type="text" id="regPhone" placeholder="Phone Number" required>
                </div>
                
                <!-- OTP Section -->
                <div class="otp-section" id="otpSection" style="display: none;">
                    <div class="input-group">
                        <i class="ph ph-chat-teardrop-text"></i>
                        <input type="text" id="regOtp" placeholder="Enter 6-digit OTP (e.g. 123456)">
                    </div>
                </div>

                <div class="input-group" id="passSection" style="display: none;">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="regPassword" placeholder="Create Password">
                </div>

                <button type="button" class="auth-btn" id="btnSendOtp">Send OTP</button>
                <button type="submit" class="auth-btn" id="btnRegister" style="display: none;">Verify & Register</button>
                
                <div class="auth-switch">
                    Already have an account? <span id="showLogin">Log In</span>
                </div>
            </form>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>
    <div class="bg-shape circle-3"></div>

    <div class="app-container" id="mainApp" style="display: none;">
        
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="ph-fill ph-student"></i>
                <h1>My A/L Vault</h1>
            </div>
            <div class="user-profile">
                <div class="avatar">👨‍🎓</div>
                <span id="welcomeText">Welcome!</span>
                <button id="btnLogout" class="logout-btn" title="Log Out"><i class="ph ph-sign-out"></i></button>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Hero Section -->
            <section class="hero glass-panel">
                <div class="hero-text">
                    <h2>Master Your Classes</h2>
                    <p>ඔබගේ භූගෝල විද්‍යාව, මාධ්‍ය සහ සිංහල පන්ති වල සියලුම online class recordings එකම තැනකින් පහසුවෙන් නරඹන්න.</p>
                </div>
            </section>

            <!-- Subject Filters -->
            <section class="filters">
                <button class="filter-btn active" data-subject="geography">
                    <i class="ph ph-globe-hemisphere-east"></i> භූගෝල විද්‍යාව
                </button>
                <button class="filter-btn" data-subject="media">
                    <i class="ph ph-video-camera"></i> මාධ්‍යය
                </button>
                <button class="filter-btn" data-subject="sinhala">
                    <i class="ph ph-chalkboard-teacher"></i> සිංහල
                </button>
            </section>

            <!-- Video Grid -->
            <section class="video-grid" id="videoGrid">
                <!-- Videos will be injected here via JavaScript -->
            </section>

        </main>
    </div>

    <!-- Video Player Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content glass-panel">
            <button class="close-btn" id="closeModal"><i class="ph ph-x"></i></button>
            <div class="video-container" id="iframeContainer">
                <!-- iframe will be injected here -->
            </div>
            <div class="modal-info">
                <span class="subject-badge" id="modalBadge">Subject</span>
                <h3 id="modalTitle">Video Title</h3>
                <p id="modalDate"><i class="ph ph-calendar-blank"></i> Date</p>
            </div>
        </div>
    </div>

    <!-- Load scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
